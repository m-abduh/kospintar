name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io/${{ github.repository }}

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  cd:
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build & Push images
        run: |
          docker build -t $REGISTRY/api:latest -f docker/api.Dockerfile .
          docker push $REGISTRY/api:latest
          docker build -t $REGISTRY/worker:latest -f docker/worker.Dockerfile .
          docker push $REGISTRY/worker:latest
          docker build -t $REGISTRY/scheduler:latest -f docker/scheduler.Dockerfile .
          docker push $REGISTRY/scheduler:latest
          docker build -t $REGISTRY/frontend:latest -f docker/frontend.Dockerfile .
          docker push $REGISTRY/frontend:latest

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/kospintar
            docker compose pull
            docker compose up -d --build
            sleep 10
            curl -f http://localhost:3000/api/health || echo "Health check failed"
